set -g default-terminal "screen-256color"



set -g prefix C-a
unbind C-b
bind-key C-a send-prefix
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on

set -s escape-time 0

# Enable Vi mode for scrolling and copying
set-window-option -g mode-keys vi
set -g set-clipboard on

# Make tmux copy mode feel closer to Vim.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "sh -c 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi'"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh -c 'if command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi'"

# Vim-style pane selection
bind -r k if -F '#{pane_at_top}' 'display-message "Already at top pane"' 'select-pane -U'
bind -r j if -F '#{pane_at_bottom}' 'display-message "Already at bottom pane"' 'select-pane -D'
bind -r h if -F '#{pane_at_left}' 'display-message "Already at leftmost pane"' 'select-pane -L'
bind -r l if -F '#{pane_at_right}' 'display-message "Already at rightmost pane"' 'select-pane -R'

# Easy config reload
bind r source-file ~/.tmux.conf

# Enable mouse for easy scrolling
set -g mouse on

# tmux plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Persist sessions automatically and restore them on tmux start.
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Keep tpm at the bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'
